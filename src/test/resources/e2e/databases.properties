# Shared JDBC profiles for E2E database scenarios.
# Override any value with REPORT_DB1_* / REPORT_DB2_* environment variables.

signing.enabled=false
mail.smtp.enabled=false

# db1 — PostgreSQL (docker-compose.test.yml postgres on port 5433 by default)
db1.url=jdbc:postgresql://localhost:5433/postgres
db1.username=postgres
db1.password=postgres
db1.driver=org.postgresql.Driver

# db2 — MySQL (docker-compose.test.yml mysql service)
db2.url=jdbc:mysql://localhost:3306/genexplus_test
db2.username=genexplus
db2.password=genexplus
db2.driver=com.mysql.cj.jdbc.Driver

report.governor.maxPages=500
report.governor.timeoutSeconds=120
report.database.warnOnAdapterMismatch=true

# Shared E2E application properties (SMTP/signing disabled by default).
# Tests override mail.smtp.port when starting GreenMail.

signing.enabled=false

mail.smtp.enabled=false
mail.smtp.host=127.0.0.1
mail.smtp.port=3025
mail.smtp.from=e2e@example.com
mail.smtp.auth=false
mail.smtp.starttls.enable=false

report.governor.maxPages=500
report.governor.timeoutSeconds=120

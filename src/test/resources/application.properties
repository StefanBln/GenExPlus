# Test configuration for unit tests.
# Database settings below are only used by integration tests (mvn -Pintegration-tests test).

report.title=Test Report
report.author=GenExPlus Test Suite

# Optional PostgreSQL connection for integration tests
#db1.url=jdbc:postgresql://localhost:5432/postgres
#db1.username=postgres
#db1.password=postgres
#db1.driver=org.postgresql.Driver

# Signing configuration (reserved for future use; keep disabled in unit tests)
signing.enabled=false
signing.keystore.path=src/test/resources/test-keystore.p12
signing.keystore.type=PKCS12
signing.keystore.alias=testalias
signing.keystore.password=testpass

# Email configuration for unit tests
mail.smtp.host=localhost
mail.smtp.port=587
mail.smtp.from=test@example.com
mail.smtp.auth=false
mail.smtp.starttls.enable=false

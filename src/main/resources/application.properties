
# Report rendering defaults
report.default.timezone=UTC
report.default.locale=de_DE

# Governor configuration for resource protection (DoS prevention)
report.governor.maxPages=500
report.governor.timeoutSeconds=120

# Optional JasperPrint virtualizer (reduces heap use during fill for large reports)
# report.virtualizer.enabled=false
# report.virtualizer.maxPages=100
# report.virtualizer.directory=

# PDF signing configuration (disabled by default)
signing.enabled=false
signing.keystore.type=PKCS12
# signing.keystore.path=/path/to/keystore.p12
# signing.keystore.alias=myalias
# signing.keystore.password=change-me
# signing.reason=Approved report
# signing.location=GenExPlus
# Password can also be provided via REPORT_KEYSTORE_PASSWORD environment variable

# Database configuration examples
# Multiple databases can be configured with db1, db2, db3 etc.
# Select the database per report job with database.id in report.conf

# PostgreSQL example (driver included in default build)
#db1.url=jdbc:postgresql://localhost:5432/reportdb
#db1.driver=org.postgresql.Driver
#db1.username=reportuser
# Password via REPORT_DB1_PASSWORD environment variable

# MySQL example (add your own JDBC driver to the classpath)
#db2.url=jdbc:mysql://localhost:3306/reports
#db2.driver=com.mysql.cj.jdbc.Driver
#db2.username=dbuser
# Password via REPORT_DB2_PASSWORD environment variable

# H2 embedded example (add your own JDBC driver to the classpath)
#db3.url=jdbc:h2:mem:testdb
#db3.driver=org.h2.Driver
#db3.username=sa

# Database connection timeout
report.db.loginTimeoutSeconds=10

# Email/SMTP configuration (disabled by default)
mail.smtp.enabled=false
# mail.smtp.host=smtp.example.com
# mail.smtp.port=587
# mail.smtp.from=noreply@example.com
# mail.smtp.username=noreply@example.com
# mail.smtp.auth=true
# mail.smtp.starttls.enable=true
# mail.smtp.starttls.required=false
# mail.smtp.ssl.enable=false
# mail.smtp.retry.count=2
# mail.smtp.retry.delayMs=2000
# mail.smtp.maxAttachmentBytes=26214400
# mail.smtp.connectiontimeout=10000
# mail.smtp.timeout=10000
# mail.smtp.debug=false
# mail.smtp.logo.resource=genexplus_logo.png
# Password should be provided via REPORT_MAIL_PASSWORD environment variable

# Local databases for integration and E2E tests.
# Usage: ./scripts/test-db-up.sh
services:
  postgres:
    image: postgres:16
    ports:
      - "${POSTGRES_TEST_PORT:-5433}:5432"
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: postgres
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

  mysql:
    image: mysql:8.4
    ports:
      - "3306:3306"
    environment:
      MYSQL_ROOT_PASSWORD: genexplus
      MYSQL_DATABASE: genexplus_test
      MYSQL_USER: genexplus
      MYSQL_PASSWORD: genexplus
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-ugenexplus", "-pgenexplus"]
      interval: 5s
      timeout: 5s
      retries: 12

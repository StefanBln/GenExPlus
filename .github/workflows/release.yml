name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: maven

      - name: Build release bundle
        run: |
          mvn -B -DskipTests package --settings .mvn/settings-ci.xml
          mkdir -p release-bundle
          cp target/genexplus-*.jar release-bundle/
          cp -r target/lib release-bundle/
          (cd release-bundle && zip -r ../genexplus-release.zip .)

      - name: Upload release artifact
        uses: softprops/action-gh-release@v2
        with:
          files: genexplus-release.zip
          generate_release_notes: true
